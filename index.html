<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game UI Phase 2</title>
    <!-- Add SEO Meta Tags -->
    <meta name="description" content="A pristine, dynamic memory game interface built with modern web technologies. Focuses on presentation, layout, and visual state transitions.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main Menu -->
    <div id="main-menu" class="menu-container">
        <div class="glass-panel menu-dialog">
            <img src="happy-brain-cartoon-representing-learning-and-creativity-free-png.webp" alt="Happy Brain Mascot" class="menu-mascot">
            <h1 class="game-title">MEMORY GAME</h1>
            <div class="menu-buttons">
                <button id="btn-easy" class="primary-btn">Easy (4x4)</button>
                <button id="btn-hard" class="primary-btn hard-btn">Hard (6x6)</button>
            </div>
        </div>
    </div>

    <div id="game-wrapper" class="game-container d-none">
        <!-- Dashboard containing status, timer and scoreboard -->
        <aside class="dashboard">
            <div class="glass-panel status-panel">
                <h1 class="visually-hidden">Memory Match Game</h1>
                <!-- Fixed space container to avoid layout shifts -->
                <div class="status-container">
                    <h2 id="status-text">Player 1's turn</h2>
                </div>
                <div class="timer-container">
                    <div class="timer" id="timer-display">00:00</div>
                </div>
            </div>
            
            <div class="players-grid" id="scoreboard">
                <!-- Player items are injected here via JS -->
            </div>
            
            <button id="exit-game-btn" class="secondary-btn">Exit to Menu</button>
        </aside>

        <!-- Main Board Area -->
        <main class="board-area">
            <div class="board-container">
                <div class="grid" id="card-grid">
                    <!-- Cards are injected here via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over-overlay" class="overlay hidden">
        <div class="glass-panel overlay-content">
            <h2 id="winner-text">Player X Wins!</h2>
            <button id="restart-btn" class="primary-btn">Play Again</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
